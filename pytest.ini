[pytest]
DJANGO_SETTINGS_MODULE = datahub.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --reuse-db
markers =
    django_db: Mark test as requiring database access
    asyncio: Mark test as async test
