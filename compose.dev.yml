name: infobus-dev
services:

  orchestrator:
    build:
      context: ./backend
      target: dev
    environment:
      - DJANGO_SETUP=True
      - UV_PROJECT_ENVIRONMENT=/home/app/.venv
      - UV_NO_SYNC=1
    env_file:
      - .env
      - .env.dev
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/home/app/.venv
      - lake_data:/app/data
    depends_on:
      database:
        condition: service_healthy
      memory:
        condition: service_healthy

  engine:
    build:
      context: ./backend
      target: engine
    environment:
      - DJANGO_SETUP=False
      - UV_PROJECT_ENVIRONMENT=/home/app/.venv
      - UV_NO_SYNC=1
    env_file:
      - .env
      - .env.dev
    volumes:
      - ./backend:/app
      - backend_venv:/home/app/.venv
      - lake_data:/app/data
    depends_on:
      database:
        condition: service_healthy
      memory:
        condition: service_healthy
      broker:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      target: scheduler
    environment:
      - DJANGO_SETUP=False
      - UV_PROJECT_ENVIRONMENT=/home/app/.venv
      - UV_NO_SYNC=1
    env_file:
      - .env
      - .env.dev
    volumes:
      - ./backend:/app
      - backend_venv:/home/app/.venv
      - lake_data:/app/data
    depends_on:
      database:
        condition: service_healthy
      memory:
        condition: service_healthy
      broker:
        condition: service_healthy

  broker:
    image: rabbitmq:4-management
    ports:
      - "${BROKER_AMQP_PORT:-5672}:5672"          # AMQP
      - "${BROKER_MANAGEMENT_PORT:-15672}:15672"  # Management UI
      - "${BROKER_PROMETHEUS_PORT:-15692}:15692"  # Prometheus
    volumes:
      - broker_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    build:
      context: ./database
    environment:
      - POSTGRES_DB=${DB_NAME:-infobus}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - database_data:/var/lib/postgresql    
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-infobus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  memory:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${MEMORY_PORT:-6379}:6379"
    volumes:
      - memory_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  context:
    build:
      context: ./context
      dockerfile: Dockerfile
    ports:
      - "${CONTEXT_PORT:-3278}:3278"
    env_file:
      - .env
      - .env.dev
    volumes:
      - ./context:/app

  knowledge:
    build:
      context: ./knowledge
      args:
        JENA_VERSION: 5.3.0
    image: fuseki
    command: ["--tdb2", "--update", "--loc", "databases/DB2", "/ds"]
    ports:
      - "3030:3030"
    volumes:
      - ./knowledge/logs:/fuseki/logs
      - ./knowledge/databases:/fuseki/databases
  
volumes:
  broker_data:
  backend_venv:
  database_data:
  memory_data:
  lake_data:

networks:
  default:
    name: infobus_network
