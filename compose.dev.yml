services:
  broker:
    image: rabbitmq:4-management
    ports:
      - "${MESSAGE_BROKER_AMQP_PORT:-5672}:5672"          # AMQP
      - "${MESSAGE_BROKER_MANAGEMENT_PORT:-15672}:15672"  # Management UI
      - "${MESSAGE_BROKER_PROMETHEUS_PORT:-15692}:15692"  # Prometheus
    volumes:
      - message_broker_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
  store:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: infobus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  state:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${STATE_PORT:-6379}:6379"
    volumes:
      - state_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    env_file:
      - .env # Base configuration
      - .env.dev # Development overrides (tracked)
      - .env.local # Personal secrets and local overrides (git-ignored)
    environment:
      # Docker-specific environment variables that override env_file values if needed
      - DB_HOST=store # Docker service name
      - REDIS_HOST=state # Docker service name
      # Development optimizations for hot reload
      - PYTHONUNBUFFERED=1 # Ensure Python output is not buffered
      - PYTHONDONTWRITEBYTECODE=1 # Prevent Python from writing .pyc files
      - WATCHDOG_POLLING=True # Force polling for file changes (better for Docker volumes)
      # GDAL library path for ARM64 architecture
      - GDAL_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/libgdal.so
      - GEOS_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/libgeos_c.so
    volumes:
      - .:/app # Mount current directory for live development
      - /app/.venv # Exclude .venv directory to prevent conflicts
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      store:
        condition: service_healthy
      state:
        condition: service_healthy
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["uv", "run", "python", "manage.py", "runserver", "0.0.0.0:8000"]
  workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    env_file:
      - .env
      - .env.dev
    command: 
      [
        "uv", 
        "run", 
        "celery", 
        "-A", 
        "publisher", 
        "worker", 
        "--loglevel=info"
      ]
    environment:
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-broker}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - DB_NAME=${DB_NAME:-infobus}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=store
      - DB_PORT=5432
      - REDIS_HOST=state
      - REDIS_PORT=6379
    volumes:
      - ./workers:/app
    depends_on:
      store:
        condition: service_healthy
      state:
        condition: service_healthy
      broker:
        condition: service_healthy
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    env_file:
      - .env
      - .env.dev
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "scheduler",
        "beat",
        "--loglevel=info",
      ]
    environment:
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-broker}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
    volumes:
      - ./scheduler:/app
    depends_on:
      store:
        condition: service_healthy
      state:
        condition: service_healthy
      broker:
        condition: service_healthy
  context:
    build:
      context: ./context
      dockerfile: Dockerfile
    ports:
      - "9876:9876"
    env_file:
      - .env
      - .env.dev
    command:
      [
        "uv",
        "run",
        "main.py",
      ]
    volumes:
      - ./context:/app
  knowledge:
    build:
      context: ./knowledge
      dockerfile: Dockerfile
      args:
        JENA_VERSION: 5.3.0
    image: fuseki
    command: ["--tdb2", "--update", "--loc", "databases/DB2", "/ds"]
    ports:
      - "3030:3030"
    volumes:
      - ./knowledge/logs:/fuseki/logs
      - ./knowledge/databases:/fuseki/databases
  
volumes:
  message_broker_data:
  postgres_data:
  state_data:
  static_volume:
  media_volume:

networks:
  default:
    name: infobus_network
