          type: string
          format: email
          nullable: true
          deprecated: true
          writeOnly: true
          example: 'persona@ejemplo.com'
    WideAlerts:
      type: object
      additionalProperties: false
      properties:
        alert_id:
          description: Identificador de la alerta
          type: string
          example: 'bUCR-001'
        alert_header:
          description: Encabezado de la alerta
          type: string
          example: 'Cierre de vías'
        alert_description:
          description: Descripción de la alerta
          type: string
          example: 'Cierre de vías en la Ciudad de la Investigación'
        alert_url:
          description: URL de la alerta
          type: string
          example: 'https://bucr.digital/alertas/bUCR-001'
        timestamp:
          description: Marca de tiempo de la alerta
          type: string
          format: date-time
          example: '2024-07-31T08:00:00-06:00'
        source:
          description: Fuente de la alerta
          type: string
          nullable: true
          example: 'Ministerio de Seguridad Pública'

    InfoService:
      type: object
      additionalProperties: false
      required: [name, type]
      properties:
        name:
          description: Identificador del servicio
          type: string
          example: 'Infobús Pantallas'
        description:
          description: Descripción del servicio
          type: string
          example: 'Servicio de pantallas informativas en la Universidad de Costa Rica'
